name: Streamlit Quiz CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on:
      ubuntu-latest

    steps:

    - name: Checkout
      uses:
        actions/checkout@v4

    - name: Setup Python
      uses:
        actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Packages
      run: |
        pip install -r requirements.txt

    - name: Validate App
      run: |
        python -m py_compile app.py